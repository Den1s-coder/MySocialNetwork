name: Backend CI (.NET)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**' 
      - '*.sln'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'backend/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Restore dependencies
      run: dotnet restore SocialNetwork_Server.sln 

    - name: Build
      run: dotnet build SocialNetwork_Server.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test SocialNetwork_Server.sln --no-build --verbosity normal