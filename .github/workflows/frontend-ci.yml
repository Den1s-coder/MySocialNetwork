name: Frontend CI (Node.js)

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/socialnetwork.client/**'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'frontend/socialnetwork.client/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/socialnetwork.client

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x' 
        cache: 'npm'
        cache-dependency-path: './frontend/socialnetwork.client/package-lock.json'

    - name: Install dependencies
      run: npm ci 

    - name: Build project
      run: npm run build
      
    - name: Run ESLint
      run: npx eslint . 